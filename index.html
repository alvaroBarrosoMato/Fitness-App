<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Asistente de Fitness</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <h1>💪 Mi Asistente de Fitness</h1>
        <nav class="nav">
            <button class="nav__btn nav__btn--active" data-tab="dashboard">📊 Dashboard</button>
            <button class="nav__btn" data-tab="planificados">📅 Planificados</button>
            <button class="nav__btn" data-tab="pasados">✅ Histórico</button>
            <button class="nav__btn" data-tab="nuevo">➕ Nuevo</button>
        </nav>
    </header>

    <div class="container">
        <section id="dashboard" class="tab-content tab-content--active">
            <h2>Dashboard</h2>
            <div id="dashboard-content" class="grid grid--2col">
                <p class="loading">Cargando datos...</p>
            </div>
        </section>

        <section id="planificados" class="tab-content">
            <h2>📅 Entrenamientos Planificados</h2>
            <div id="planificados-list">
                <p class="loading">Cargando...</p>
            </div>
        </section>

        <section id="pasados" class="tab-content">
            <h2>✅ Histórico de Entrenamientos</h2>
            <div id="pasados-list">
                <p class="loading">Cargando...</p>
            </div>
        </section>

        <section id="nuevo" class="tab-content">
            <h2>➕ Nuevo Entrenamiento Planificado</h2>
            <div class="card">
                <form id="new-workout-form" class="form">
                    <div class="form__row">
                        <label>Día</label>
                        <input type="date" name="dia" required>
                    </div>
                    <div class="form__row">
                        <label>Rutina</label>
                        <input type="text" name="rutina" placeholder="Ej: Pecho y Tríceps" required>
                    </div>
                    <h4>Ejercicios</h4>
                    <div id="new-exercises-list"></div>
                    <button type="button" class="btn btn--secondary" id="btn-add-exercise">+ Añadir ejercicio</button>
                    <button type="submit" class="btn btn--primary">Guardar entrenamiento</button>
                </form>
                <p id="new-workout-feedback" class="feedback"></p>
            </div>
        </section>
    </div>

    <!-- Modal para iniciar / completar un entrenamiento -->
    <div id="workout-modal" class="modal modal--hidden">
        <div class="modal__backdrop" data-close-modal></div>
        <div class="modal__content">
            <button class="modal__close" data-close-modal>&times;</button>
            <h3 id="workout-modal-title">Entrenamiento</h3>
            <p class="modal__subtitle" id="workout-modal-subtitle"></p>
            <div id="workout-modal-exercises"></div>
            <div class="modal__actions">
                <button class="btn btn--secondary" data-close-modal>Cancelar</button>
                <button class="btn btn--primary" id="btn-complete-workout">Completar entrenamiento</button>
            </div>
            <p id="workout-modal-feedback" class="feedback"></p>
        </div>
    </div>

    <footer class="footer">
        <p>Asistente Personal de Fitness © 2026 | Datos almacenados en Google Sheets</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
