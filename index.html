<!DOCTYPE html>
<html lang="es">
<head>
<link rel="shortcut icon" type="image/x-icon" href="favicon.png">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>IRON LOG — Entrenamientos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <header class="masthead">
    <div class="masthead-top">
      <span>EST. MMXXVI · MADRID</span>
      <span class="issue">VOL.2.1</span>
    </div>
    <div class="title-row">
      <h1 class="brand">
        Iron Log
        <span class="thin">diario de entrenamiento</span>
      </h1>
      <div class="brand-mark">LIFT<br>PUSH<br>PULL</div>
    </div>
  </header>

  <nav class="tabs">
  <button id="tab-planned" class="active" data-view="planned">
    <span class="num">01</span>Planeados
  </button>
  <button id="tab-past" data-view="past">
    <span class="num">02</span>Pasados
  </button>
  <button id="tab-coach" data-view="coach">
    <span class="num">03</span>Coach
  </button>
  </nav>

  <div class="statusbar">
    <span class="dot" id="api-dot"></span>
    <span id="api-status">Sin conectar</span>
    <span class="sep">·</span>
    <span id="last-sync">—</span>
  </div>

  <!-- ============ PLANNED VIEW ============ -->
  <section class="view active" id="view-planned">
    <div class="section-header">
      <h2>Próximas sesiones</h2>
      <div class="count">Total <b id="count-planned">0</b></div>
    </div>
    <div id="today-slot"></div>
    <div id="list-planned"></div>
  </section>

  <!-- ============ PAST VIEW ============ -->
  <section class="view" id="view-past">
    <div class="section-header">
      <h2>Historial completado</h2>
      <div class="count">Total <b id="count-past">0</b></div>
    </div>
    <div id="list-past"></div>
  </section>
</div>
<section class="view" id="view-coach">
  <div class="section-header">
    <h2>Coach virtual</h2>
    <div class="count">
      <button id="coach-clear" class="coach-clear-btn" title="Limpiar conversación">Limpiar</button>
    </div>
  </div>
 
  <div class="coach-shell">
    <div class="coach-messages" id="coach-messages">
      <div class="coach-empty">
        <div class="big">01</div>
        <p>Pregunta al coach. Puede consultar tus datos y proponer cambios en la rutina.</p>
      </div>
    </div>
 
    <form class="coach-composer" id="coach-composer" autocomplete="off">
      <textarea
        id="coach-input"
        rows="1"
        placeholder="Escribe al coach…"
        autocomplete="off"
        autocorrect="off"
      ></textarea>
      <button type="submit" id="coach-send" aria-label="Enviar">→</button>
    </form>
  </div>
</section>
 
<!-- ============ FULL-SCREEN WORKOUT RUNNER ============ -->
<div class="runner" id="runner">
  <header class="runner-head">
    <button class="runner-close" id="runner-close" aria-label="Cerrar">✕</button>
    <div class="runner-title">
      <span class="runner-routine" id="runner-routine">—</span>
      <span class="runner-progress" id="runner-progress">0 / 0</span>
    </div>
    <div class="runner-bar"><div class="runner-bar-fill" id="runner-bar-fill"></div></div>
  </header>

  <div class="runner-track" id="runner-track">
    <!-- slides injected here -->
  </div>

  <footer class="runner-foot">
    <button class="runner-nav prev" id="runner-prev">‹ Anterior</button>
    <div class="runner-dots" id="runner-dots"></div>
    <button class="runner-nav next" id="runner-next">Siguiente ›</button>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
