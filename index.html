<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Asistente de Fitness</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .header {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .nav__btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .nav__btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .nav__btn--active {
            background: white;
            color: #FF6B6B;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s;
        }
        
        .tab-content--active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .tab-content h2 {
            color: #FF6B6B;
            margin-bottom: 20px;
            border-bottom: 3px solid #FF6B6B;
            padding-bottom: 10px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .card h3, .card h4 {
            color: #FF6B6B;
            margin-bottom: 15px;
        }
        
        .grid {
            display: grid;
            gap: 20px;
        }
        
        .grid--2col {
            grid-template-columns: 1fr 1fr;
        }
        
        @media (max-width: 768px) {
            .grid--2col {
                grid-template-columns: 1fr;
            }
            
            .nav {
                gap: 5px;
            }
            
            .nav__btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
        
        .loading {
            text-align: center;
            color: #999;
            padding: 40px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f5f5f5;
            font-weight: 600;
            color: #FF6B6B;
        }
        
        ul {
            list-style: none;
        }
        
        li {
            padding: 10px;
            margin: 5px 0;
            background: #f9f9f9;
            border-left: 3px solid #FF6B6B;
            border-radius: 4px;
        }
        
        .footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <h1>💪 Mi Asistente de Fitness</h1>
        <nav class="nav">
            <button class="nav__btn nav__btn--active" data-tab="dashboard">📊 Dashboard</button>
            <button class="nav__btn" data-tab="planificados">📅 Planificados</button>
            <button class="nav__btn" data-tab="pasados">✅ Histórico</button>
        </nav>
    </header>

    <!-- CONTENIDO -->
    <div class="container">
        
        <!-- DASHBOARD -->
        <section id="dashboard" class="tab-content tab-content--active">
            <h2>Dashboard</h2>
            <div id="dashboard-content" class="grid grid--2col">
                <p class="loading">Cargando datos...</p>
            </div>
        </section>

        <!-- ENTRENAMIENTOS PLANIFICADOS -->
        <section id="planificados" class="tab-content">
            <h2>📅 Entrenamientos Planificados</h2>
            <div id="planificados-list">
                <p class="loading">Cargando...</p>
            </div>
        </section>

        <!-- HISTÓRICO -->
        <section id="pasados" class="tab-content">
            <h2>✅ Histórico de Entrenamientos</h2>
            <div id="pasados-list">
                <p class="loading">Cargando...</p>
            </div>
        </section>

    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Asistente Personal de Fitness © 2026 | Datos almacenados en Google Sheets</p>
    </footer>

    <script src="app_personalizado.js"></script>
</body>
</html>
